<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FusionRobotExporter — URDF/SDF Viewer</title>
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #1e1e22; color: #ddd; }
    #app { display: flex; height: 100%; }
    #sidebar { width: 280px; padding: 14px; box-sizing: border-box; background: #26262c; overflow-y: auto; }
    #sidebar h1 { font-size: 15px; margin: 0 0 12px; }
    button { padding: 8px 10px; box-sizing: border-box; background: #34343c; color: #eee;
             border: 1px solid #44444c; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #3d3d47; }
    #openBtn { width: 100%; margin-bottom: 12px; }
    #current { font-size: 12px; color: #8ab4f8; word-break: break-all; margin-bottom: 14px; }
    .chk { display: flex; align-items: center; gap: 7px; font-size: 13px; margin-bottom: 10px; cursor: pointer; }
    .settings { border-top: 1px solid #34343c; padding-top: 12px; margin-bottom: 14px; }
    .settings .field { margin-bottom: 12px; }
    .settings label { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; }
    .settings input[type=range] { width: 100%; margin-top: 4px; }
    .settings .val { color: #8ab4f8; }
    #status { font-size: 12px; white-space: pre-wrap; line-height: 1.4; }
    #status .err { color: #ff8080; }
    #status .ok { color: #88cc88; }
    #viewport { flex: 1; position: relative; }
    canvas { display: block; }

    /* Modal file browser */
    #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55);
             display: flex; align-items: center; justify-content: center; z-index: 10; }
    #modal.hidden { display: none; }
    .dialog { width: 560px; max-width: 92vw; height: 70vh; display: flex; flex-direction: column;
              background: #26262c; border: 1px solid #44444c; border-radius: 8px; overflow: hidden;
              box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    .dlg-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px;
                background: #2e2e36; border-bottom: 1px solid #3a3a44; }
    .dlg-head .title { font-size: 13px; font-weight: 600; }
    #dlgPath { flex: 1; font-size: 12px; color: #8ab4f8; word-break: break-all; }
    #dlgClose { padding: 4px 9px; }
    .dlg-list { flex: 1; overflow-y: auto; }
    .row { padding: 8px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #2c2c33; }
    .row:hover { background: #34343c; }
    .row.dir { color: #e0c987; }
    .row.file { color: #9fd09f; }
    .empty { padding: 12px 14px; font-size: 12px; color: #777; }

    /* Mesh simplification panel */
    .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .panel-head strong { font-size: 13px; }
    #revertBtn { padding: 3px 8px; font-size: 11px; }
    .lk { border: 1px solid #34343c; border-radius: 5px; padding: 8px; margin-bottom: 8px; }
    .lk-name { font-size: 12px; color: #cdd6f4; font-weight: 600; margin-bottom: 6px; word-break: break-all; }
    .tgt { display: grid; grid-template-columns: 56px 1fr auto; gap: 6px; align-items: center; margin-bottom: 5px; }
    .tgt .lbl { font-size: 11px; color: #9aa; }
    .tgt .lbl.vis { color: #9fd09f; }
    .tgt .lbl.col { color: #e0c987; }
    .tgt .faces { font-size: 11px; color: #888; }
    .tgt input[type=range] { width: 100%; }
    .tgt .pct { font-size: 11px; color: #8ab4f8; min-width: 30px; text-align: right; }
    .tgt button { padding: 3px 7px; font-size: 11px; }
    .tgt input[type=number] { background: #1e1e22; color: #eee; border: 1px solid #44444c;
                              border-radius: 3px; padding: 2px 4px; font-size: 11px; }
    .tgt.disabled { opacity: 0.4; }
    #clearPreviewBtn { padding: 3px 8px; font-size: 11px; color: #ffd08a; }
    /* per-row algorithm control */
    .algo-ctl { margin: 4px 0; }
    .algo-sel { width: 100%; background: #1e1e22; color: #eee; border: 1px solid #44444c;
                border-radius: 4px; padding: 4px; font-size: 11px; }
    .algo-note { font-size: 10px; color: #c0a060; margin-top: 4px; line-height: 1.3; }
    .algo-params .p { margin-top: 5px; }
    .algo-params .p label { font-size: 10px; color: #9aa; display: flex; justify-content: space-between; }
    .algo-params .p input[type=range] { width: 100%; }
    .algo-params .p .pv { color: #8ab4f8; }
    .algo-params .p label.bool { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #ccc; }
    .previewBtn.live { background: #5a4a1e; border-color: #b9912f; color: #ffd87a; }
    .panel-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .panel-actions button { padding: 4px 8px; font-size: 11px; }
    #simplifyMsg { font-size: 11px; white-space: pre-wrap; line-height: 1.4; margin-top: 6px; }
    #simplifyMsg .err { color: #ff8080; }
    #simplifyMsg .ok { color: #88cc88; }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h1>URDF / SDF Viewer</h1>
      <button id="openBtn">📂 Open URDF / SDF…</button>
      <div id="current">No file loaded</div>
      <label class="chk"><input type="checkbox" id="showJoints" checked> Show joints</label>
      <label class="chk"><input type="checkbox" id="showNames" checked> Show joint names</label>

      <div class="settings">
        <div class="field">
          <label>Joint name size <span class="val" id="fontVal">1.0×</span></label>
          <input type="range" id="fontSize" min="0.3" max="4" step="0.1" value="1">
        </div>
        <div class="field">
          <label>Frame size <span class="val" id="axisVal">1.0×</span></label>
          <input type="range" id="axisSize" min="0.3" max="4" step="0.1" value="1">
        </div>
      </div>

      <div class="settings" id="simplifyPanel" style="display:none;">
        <div class="panel-head">
          <strong>Mesh simplification</strong>
          <span>
            <button id="clearPreviewBtn" title="Stop previewing and show the current meshes" style="display:none;">✕ Preview</button>
            <button id="revertBtn" title="Restore the original description from backup">⟲ Revert</button>
          </span>
        </div>
        <div class="panel-actions">
          <button id="applyAllBtn" title="Apply every row's settings at once">▶ Apply all</button>
          <button id="exportBtn" title="Download the current options as a preset file">⬇ Export preset</button>
          <button id="importBtn" title="Load options from a preset file">⬆ Import preset</button>
          <input type="file" id="importFile" accept=".json,application/json" style="display:none">
        </div>
        <div id="linkList"></div>
        <div id="simplifyMsg"></div>
      </div>

      <div id="status">Click “Open” to pick a file.</div>
    </div>
    <div id="viewport"></div>
  </div>

  <div id="modal" class="hidden">
    <div class="dialog">
      <div class="dlg-head">
        <span class="title">Open</span>
        <span id="dlgPath">/</span>
        <button id="dlgClose">✕</button>
      </div>
      <div id="dlgList" class="dlg-list"></div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/static/viewer.js"></script>
</body>
</html>
